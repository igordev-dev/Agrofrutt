<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AgroFrut 🍊</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<nav>
  <div style="display:flex;align-items:center;gap:.5rem">
    <a href="/" class="logo">🍊 <span>AgroFrut</span></a>
    <a href="/relatorio" class="btn-relatorio" title="Relatório">📊 Relatório</a>
  </div>
  <div class="nav-btns">
    <a href="/clientes" {% if request.path == '/clientes' %}class="active"{% endif %}>👤 Clientes</a>
    <a href="/fornecedores" {% if request.path == '/fornecedores' %}class="active"{% endif %}>🚚 Fornecedores</a>
  </div>
</nav>
<div class="container">
  {% block content %}{% endblock %}
</div>

<!-- MODAL EDIÇÃO (reutilizável via JS) -->
<div id="modal-overlay" class="modal-overlay" onclick="closeModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <span id="modal-title">Editar</span>
      <button onclick="document.getElementById('modal-overlay').classList.remove('open')" class="modal-close">✕</button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<script>
function getCSRF() {
  // Busca o token CSRF do primeiro input[name=csrf_token] do DOM
  let token = document.querySelector('input[name=csrf_token]');
  return token ? `<input type='hidden' name='csrf_token' value='${token.value}'>` : '';
}
function openModal(title, bodyHtml) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = bodyHtml.replace('{{ csrf_token() }}', getCSRF());
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal(e) {
  if (e.target === document.getElementById('modal-overlay'))
    document.getElementById('modal-overlay').classList.remove('open');
}
</script>
</body>
</html>
